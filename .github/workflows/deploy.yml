# Trigger: push a master o manuale (Actions → Deploy to Server → Run workflow)
#
# Diagnostica:
# - "ssh.ParsePrivateKey: ssh: no key found" → SSH_PRIVATE_KEY non è PEM valida (o .ppk senza conversione).
# - "this private key is passphrase protected" → crea il secret SSH_KEY_PASSPHRASE con la stessa passphrase
#   usata in PuTTYgen per aprire la chiave (obbligatorio se la chiave è cifrata).
# - Se fallisce solo "SSH smoke" → rete/firewall/chiave/host; se smoke OK e deploy no → git/pip/sudo.
name: Deploy to Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          if [ -z "$SSH_HOST" ]; then echo "::error::Secret SSH_HOST mancante o vuoto"; missing=1; fi
          if [ -z "$SSH_USER" ]; then echo "::error::Secret SSH_USER mancante o vuoto"; missing=1; fi
          if [ -z "$SSH_KEY" ]; then echo "::error::Secret SSH_PRIVATE_KEY mancante o vuoto"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Secrets obbligatori presenti."

      - name: Resolve SSH port
        id: sshport
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "Using SSH port: $PORT"

      # -----------------------------------------------------------------
      # 1) Solo connessione SSH — niente git/pip/sudo
      # -----------------------------------------------------------------
      - name: SSH smoke (solo echo)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ steps.sshport.outputs.port }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          debug: true
          timeout: 2m
          command_timeout: 2m
          script_stop: true
          script: |
            set -e
            echo "=== SSH_SMOKE_OK ==="
            whoami
            hostname || true
            uname -a || true

      # -----------------------------------------------------------------
      # 2) Deploy completo
      # -----------------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ steps.sshport.outputs.port }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          debug: true
          request_pty: true
          timeout: 2m
          command_timeout: 45m
          script_stop: true
          script: |
            set -eo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/chatbot"
            fi

            REPO_URL="https://github.com/GiorgioGSunnit/SunnitAI-V2.git"
            BRANCH="master"
            VENV_DIR="$APP_DIR/.venv"

            echo "=== Deploy start ==="
            echo "APP_DIR=$APP_DIR"
            echo "BRANCH=$BRANCH"

            mkdir -p "$(dirname "$APP_DIR")"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -d "$APP_DIR" ] && [ -n "$(ls -A "$APP_DIR" 2>/dev/null || true)" ]; then
                echo "ERRORE: $APP_DIR esiste ma non è un clone git (.git mancante)."
                echo "Svuota la cartella o rimuovila, poi rilancia il deploy."
                exit 1
              fi
              echo "Primo deploy: git clone..."
              if ! command -v git >/dev/null 2>&1; then
                echo "ERRORE: git non installato sul server. Installa: sudo apt-get install -y git"
                exit 1
              fi
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if ! command -v python3 >/dev/null 2>&1; then
              echo "ERRORE: python3 non trovato sul server."
              exit 1
            fi

            ensure_venv() {
              if [ -d "$VENV_DIR" ]; then
                echo "Riutilizzo venv esistente: $VENV_DIR"
              fi
              if python3 -m venv "$VENV_DIR" 2>/dev/null; then
                return 0
              fi
              echo "python3 -m venv fallito (spesso manca il pacchetto python3-venv)."
              if command -v sudo >/dev/null 2>&1; then
                echo "Tento: sudo apt-get install -y python3-venv python3-pip..."
                sudo apt-get update -qq
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq python3-venv python3-pip
                python3 -m venv "$VENV_DIR"
              else
                echo "Installa manualmente python3-venv sul server e rilancia."
                exit 1
              fi
            }

            ensure_venv
            . "$VENV_DIR/bin/activate"
            pip install --upgrade pip setuptools wheel
            export PIP_DISABLE_PIP_VERSION_CHECK=1
            if ! pip install -e . --no-cache-dir; then
              echo "::error::pip install -e . fallito (vedi log sopra)."
              exit 1
            fi

            if [ ! -f "$APP_DIR/.env" ] && [ -f "$APP_DIR/.env.production" ]; then
              cp "$APP_DIR/.env.production" "$APP_DIR/.env"
            fi

            RESTART_CMD="${{ secrets.DEPLOY_RESTART_CMD }}"
            if [ -n "${RESTART_CMD}" ]; then
              echo "Esecuzione comando restart..."
              bash -lc "$RESTART_CMD"
            else
              echo "DEPLOY_RESTART_CMD non impostato: salto restart servizio."
            fi

            echo "=== Deploy completato ==="
